    let currentCat = 'All';

    function draw() {
        const s = document.getElementById('s').value.toLowerCase();
        const container = document.getElementById('list');
        container.innerHTML = '';

        list.filter(f => (currentCat === 'All' || f[0].toUpperCase() === currentCat) && f.toLowerCase().includes(s))
            .forEach(file => {
                const btn = document.createElement('div');
                btn.className = 'g';
                btn.innerHTML = `<span>${file.split('.')[0].toUpperCase()}</span>`;
                btn.onclick = () => {
                    document.getElementById('f').src = "offline/" + file;
                    document.getElementById('view').style.display = 'block';
                };
                container.appendChild(btn);
            });
    }

    function initTabs() {
        const letters = ['All', ...new Set(list.map(f => f[0].toUpperCase()))].sort();
        const tDiv = document.getElementById('tabs');
        letters.forEach(l => {
            const b = document.createElement('div');
            b.className = 't';
            b.innerText = l;
            b.onclick = () => {
                document.querySelectorAll('.t').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                currentCat = l;
                draw();
            };
            tDiv.appendChild(b);
        });
        document.querySelector('.t').classList.add('active');
        draw();
    }

    function cls() { document.getElementById('view').style.display='none'; document.getElementById('f').src=''; }
    window.onkeydown = (e) => { if(e.key==="Escape") cls(); };
